name: Verify public evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Run authority-engine tests
        run: python -m unittest discover -s tests -v
      - name: Run portfolio tests
        working-directory: site
        run: |
          python build.py
          python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python -m compileall -q reference_agent tests site
      - name: Reject private contact and internal-only markers
        shell: bash
        run: |
          ! grep -RniE 'protonmail\.com|internal-only|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY' \
            --exclude='ci.yml' --exclude-dir='.git' --exclude-dir='__pycache__' .
